<!DOCTYPE html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<div class="container mt-5" style="max-width: 600px;">
    <!-- 1. 질문 카드 섹션 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="card-title mb-0">투표하기</h5>
        </div>
        <div class="card-body">
            {% if question %}
                <h3 class="card-text mb-4 text-dark">{{ question.question_text }}</h3>

                <ul class="list-group list-group-flush">
                    {% for choice in question.choice_set.all %}
                        <li class="list-group-item d-flex justify-content-between align-items-center px-0">
                            <form action="{% url 'encore:vote' choice.id %}" method="post" class="w-100">
                                {% csrf_token %}
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="fs-5">{{ choice.choice_text }}</span>
                                    <span class="fs-5">{{ choice.votes }}</span>
                                    <button type="submit" class="btn btn-outline-primary btn-sm px-3">
                                        투표
                                    </button>
                                </div>
                            </form>
                        </li>
                    {% endfor %}
                </ul>
            {% else %}
                <div class="alert alert-warning mb-0" role="alert">
                    질문이 존재하지 않습니다.
                </div>
            {% endif %}
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h6 class="card-subtitle mb-3 text-muted">새로운 선택지 등록</h6>
            <form action="{% url 'encore:choice_create' question.id %}" method="post" class="row g-2">
                {% csrf_token %}
                <div class="col-9">
                    <textarea name="content" id="content" class="form-control" rows="1" placeholder="새로운 선택지를 입력하세요..."></textarea>
                </div>
                <div class="col-3">
                    <button type="submit" class="btn btn-dark w-100">등록</button>
                </div>
            </form>
        </div>
    </div>
</div>
