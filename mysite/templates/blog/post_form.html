{% extends 'base.html' %}
{% block content %}
<div>
    <h5>내용 등록</h5>
    <form method="post">
        {% csrf_token %}
        <div>
            <label for="title">제목</label>
            <input type="text" name="title" id="title">
        </div>
        <div>
            <label for="content">내용</label>
            <textarea name="content" id="content" rows="15">

            </textarea>
        </div>
        <button type="submit">저장</button>
    </form>
</div>
{% endblock %}
